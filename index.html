<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
    <meta name="description" content="Configurador profesional de tartas personalizadas, optimizado para PC y móvil">
    <meta name="theme-color" content="#faf7f2" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#3b2314" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tartas">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.webmanifest">
    <title>Configurador de Tartas Profesional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://image.pollinations.ai">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="skip-link" href="#main-vista">Saltar al contenido</a>

    <div class="app" role="application" aria-label="Configurador de tartas">

        <!-- ── Vista de imagen (móvil: arriba, PC: derecha) ── -->
        <main class="vista" id="main-vista" aria-live="polite">
            <div class="vista-inner">
                <div class="placeholder" id="placeholder">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
                        <path d="M12 21.5c-4.5 0-9-1.5-9-4.5V7.5c0-3 4.5-4.5 9-4.5s9 1.5 9 4.5V17c0 3-4.5 4.5-9 4.5z"></path>
                        <path d="M3 7.5c0 3 4.5 4.5 9 4.5s9-1.5 9-4.5"></path>
                        <path d="M3 12.5c0 3 4.5 4.5 9 4.5s9-1.5 9-4.5"></path>
                    </svg>
                    <span>Configura tu tarta y pulsa <strong>Generar</strong></span>
                    <kbd class="kbd-hint" aria-hidden="true">Ctrl + G</kbd>
                </div>

                <div class="loader" id="loader" role="status" aria-label="Generando imagen">
                    <div class="spinner"></div>
                    <div class="loader-text">Diseñando tu tarta…</div>
                    <button class="btn btn-ghost btn-cancel" id="btnCancelar2" type="button">Cancelar</button>
                </div>

                <div class="foto-marco" id="fotoMarco">
                    <img id="foto" src="" alt="Previsualización de la tarta generada" loading="lazy" decoding="async">
                </div>

                <div class="error-msg" id="errorMsg" role="alert">
                    <strong>No se pudo generar la imagen.</strong>
                    <span>Comprueba tu conexión e inténtalo de nuevo.</span>
                </div>
            </div>

            <!-- Historial: solo visible cuando hay imágenes -->
            <aside class="historial" id="historial" aria-label="Historial de generaciones" hidden>
                <h4>Recientes</h4>
                <div class="historial-list" id="historialList"></div>
            </aside>
        </main>

        <!-- ── Panel de configuración (móvil: abajo, PC: izquierda) ── -->
        <aside class="panel" aria-label="Panel de configuración">
            <div class="panel-header">
                <h2>Configurador</h2>
                <button class="btn-icon" id="btnAjustes" type="button" aria-label="Abrir ajustes de la tienda" title="Ajustes (S)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>

            <div class="scroll-area">
                <div class="field">
                    <label for="inputDiametro" id="labelDiametro">Diámetro (20 – 40 cm)</label>
                    <input type="number" id="inputDiametro" min="20" max="40" value="30" inputmode="numeric" autocomplete="off">
                </div>

                <div class="field">
                    <span class="altura-badge" id="alturaLabel">Altura estimada: 15.0 cm</span>
                </div>

                <div class="field">
                    <label for="textareaDesc">Descripción / Notas</label>
                    <textarea id="textareaDesc" placeholder="Ej: Estilo minimalista, flores blancas…" maxlength="300" rows="3"></textarea>
                    <div class="char-count" id="charCount" aria-live="polite">0 / 300</div>
                </div>

                <div id="selectores-dinamicos" role="group" aria-label="Opciones de la tarta"></div>
            </div>

            <div class="panel-actions">
                <button class="btn btn-primary" id="btnGenerar" type="button">
                    <span>Generar diseño</span>
                    <kbd class="kbd-hint kbd-inline" aria-hidden="true">⌃G</kbd>
                </button>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btnCopiar" type="button" title="Copiar prompt (Ctrl+C)">Copiar prompt</button>
                    <button class="btn btn-secondary" id="btnDescargar" type="button" disabled title="Descargar (Ctrl+S)">Descargar</button>
                </div>
                <button class="btn btn-whatsapp" id="btnWhatsApp" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                    <span>Enviar a tienda</span>
                </button>
            </div>
        </aside>

    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <!-- ── Modal / Bottom-sheet de ajustes ── -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
        <div class="modal" role="document">
            <div class="modal-drag-handle" aria-hidden="true"></div>
            <div class="modal-head">
                <h3 id="modalTitle">Ajustes de la tienda</h3>
                <button class="btn-icon" id="btnCerrarModal" type="button" aria-label="Cerrar ajustes">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <section class="ajuste-seccion">
                    <h4>General</h4>
                    <div class="field">
                        <label for="adj_whatsapp">WhatsApp (con prefijo)</label>
                        <input type="tel" id="adj_whatsapp" inputmode="tel" placeholder="34600000000">
                    </div>
                    <div class="grid-2">
                        <div class="field">
                            <label for="adj_diamMin">Diám. mín (cm)</label>
                            <input type="number" id="adj_diamMin" inputmode="numeric">
                        </div>
                        <div class="field">
                            <label for="adj_diamMax">Diám. máx (cm)</label>
                            <input type="number" id="adj_diamMax" inputmode="numeric">
                        </div>
                    </div>
                </section>

                <section class="ajuste-seccion">
                    <div class="seccion-head">
                        <h4>Desplegables personalizados</h4>
                        <button class="btn btn-secondary btn-sm" id="btnAddSelector" type="button">+ Añadir</button>
                    </div>
                    <div id="lista-ajustes-selectores"></div>
                </section>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancelar" type="button">Cancelar</button>
                <button class="btn btn-primary" id="btnGuardar" type="button">Guardar cambios</button>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
