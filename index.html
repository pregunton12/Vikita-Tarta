<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Configurador profesional de tartas personalizadas">
    <meta name="theme-color" content="#faf7f2">
    <title>Configurador de Tartas Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- ── Panel izquierdo ── -->
        <aside class="panel">
            <div class="panel-header">
                <h2>Configurador</h2>
                <button class="btn-settings" id="btnAjustes" type="button" title="Configurar opciones">⚙️</button>
            </div>

            <div class="scroll-area">
                <!-- Diámetro -->
                <div class="field">
                    <label for="inputDiametro" id="labelDiametro">Diámetro (20 – 40 cm)</label>
                    <input type="number" id="inputDiametro" min="20" max="40" value="30">
                </div>

                <!-- Altura estimada -->
                <div class="field">
                    <span class="altura-badge" id="alturaLabel">Altura estimada: 15.0 cm</span>
                </div>

                <!-- Descripción -->
                <div class="field">
                    <label for="textareaDesc">Descripción / Notas</label>
                    <textarea id="textareaDesc" placeholder="Ej: Estilo minimalista, flores blancas..." maxlength="300"></textarea>
                    <div class="char-count" id="charCount">0 / 300</div>
                </div>

                <!-- Selectores dinámicos -->
                <div id="selectores-dinamicos"></div>
            </div>

            <!-- Botones de acción -->
            <div class="panel-actions">
                <button class="btn btn-gen" id="btnGenerar" type="button">GENERAR DISEÑO</button>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btnCopiar" type="button">Copiar Prompt</button>
                    <button class="btn btn-secondary" id="btnDescargar" type="button" disabled>Descargar</button>
                </div>
                <button class="btn btn-whatsapp" id="btnWhatsApp" type="button">Enviar a Tienda</button>
            </div>
        </aside>

        <!-- ── Panel derecho ── -->
        <main class="vista">
            <div class="placeholder" id="placeholder">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M12 21.5c-4.5 0-9-1.5-9-4.5V7.5c0-3 4.5-4.5 9-4.5s9 1.5 9 4.5V17c0 3-4.5 4.5-9 4.5z"></path>
                    <path d="M3 7.5c0 3 4.5 4.5 9 4.5s9-1.5 9-4.5"></path>
                    <path d="M3 12.5c0 3 4.5 4.5 9 4.5s9-1.5 9-4.5"></path>
                </svg>
                <span>Configura tu tarta</span>
            </div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div class="loader-text">Diseñando...</div>
            </div>

            <div class="foto-marco" id="fotoMarco">
                <img id="foto" src="" alt="Tarta">
            </div>

            <div class="error-msg" id="errorMsg">Error al generar imagen.</div>
        </main>
    </div>

    <div id="toast"></div>

    <!-- ── Modal de ajustes ── -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-head">
                <h3>Ajustes de la Tienda</h3>
                <button class="modal-close" id="btnCerrarModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="ajuste-seccion">
                    <h4>General</h4>
                    <div class="field">
                        <label>WhatsApp (con prefijo)</label>
                        <input type="text" id="adj_whatsapp">
                    </div>
                    <div class="btn-group">
                        <div class="field">
                            <label>Diám. Mín</label>
                            <input type="number" id="adj_diamMin">
                        </div>
                        <div class="field">
                            <label>Diám. Máx</label>
                            <input type="number" id="adj_diamMax">
                        </div>
                    </div>
                </div>

                <div class="ajuste-seccion">
                    <h4>Inteligencia Artificial</h4>
                    <div class="field">
                        <label>Groq API Key</label>
                        <div style="position:relative;">
                            <input type="password" id="adj_groqApiKey" placeholder="gsk_..." style="padding-right:40px;">
                            <button type="button" id="btnToggleKey" title="Mostrar/ocultar" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8a7968;font-size:1rem;">👁</button>
                        </div>
                        <small style="color:#8a7968;font-size:0.7rem;margin-top:4px;">Obtén tu clave gratuita en <a href="https://console.groq.com" target="_blank" style="color:#c8894a;">console.groq.com</a>. Se guarda solo en este navegador.</small>
                    </div>
                </div>
                
                <div class="ajuste-seccion">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h4>Desplegables</h4>
                        <button class="btn btn-secondary" id="btnAddSelector" style="padding:5px 10px; font-size:0.75rem;">+ Añadir</button>
                    </div>
                    <div id="lista-ajustes-selectores">
                        <!-- Se llena dinámicamente -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                <button class="btn btn-gen" id="btnGuardar" style="padding:10px 20px; font-size:0.9rem;">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
