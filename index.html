<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Configurador interactivo de tartas con generación de imágenes mediante IA">
    <meta name="theme-color" content="#faf7f2">
    <title>Configurador de Tartas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <noscript>
        <div class="noscript-warning">
            Esta aplicación necesita JavaScript activado para funcionar.
        </div>
    </noscript>

    <div class="app">
        <!-- Panel izquierdo -->
        <aside class="panel" aria-label="Panel de configuración">
            <div class="panel-header">
                <h2>Configurador</h2>
                <button class="btn-settings" id="btnAjustes" type="button" title="Abrir ajustes" aria-label="Abrir ajustes" aria-haspopup="dialog">
                    <span aria-hidden="true">⚙️</span>
                </button>
            </div>

            <!-- Diámetro -->
            <div class="field">
                <label for="inputDiametro" id="labelDiametro">Diámetro (20 – 40 cm)</label>
                <input type="number" id="inputDiametro" min="20" max="40" value="30" step="1" inputmode="numeric">
            </div>

            <!-- Altura estimada -->
            <div class="field">
                <span class="altura-badge" id="alturaLabel" aria-live="polite">Altura estimada: 15.0 cm</span>
            </div>

            <!-- Descripción -->
            <div class="field">
                <label for="textareaDesc">Descripción (máx. 300 caracteres)</label>
                <textarea id="textareaDesc" placeholder="Describe el estilo, decoración, tema, colores, ocasión..." maxlength="300" rows="3"></textarea>
                <div class="char-count" id="charCount" aria-live="polite">0 / 300</div>
            </div>

            <!-- Selectores dinámicos -->
            <div id="selectores-dinamicos" role="group" aria-label="Opciones de la tarta"></div>

            <!-- Botones de acción -->
            <button class="btn btn-gen" id="btnGenerar" type="button">Generar imagen</button>
            <button class="btn btn-copy" id="btnCopiar" type="button">Copiar prompt</button>
            <button class="btn btn-save" id="btnGuardarImagen" type="button" disabled>Guardar imagen</button>
        </aside>

        <!-- Panel derecho (vista previa) -->
        <main class="vista" aria-label="Vista previa">
            <!-- Placeholder inicial -->
            <div class="placeholder" id="placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>Configura y genera tu tarta</span>
            </div>

            <!-- Loader -->
            <div class="loader" id="loader" role="status" aria-live="polite">
                <div class="spinner" aria-hidden="true"></div>
                <div class="loader-text">Generando imagen...</div>
            </div>

            <!-- Galería de imágenes -->
            <div class="galeria" id="galeria">
                <div class="foto-marco" id="fotoMarco">
                    <button class="nav-arrow nav-prev" id="btnPrev" type="button" aria-label="Imagen anterior" hidden>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" focusable="false">
                            <polyline points="15 6 9 12 15 18"></polyline>
                        </svg>
                    </button>
                    <button class="nav-arrow nav-next" id="btnNext" type="button" aria-label="Siguiente imagen" hidden>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" focusable="false">
                            <polyline points="9 6 15 12 9 18"></polyline>
                        </svg>
                    </button>
                    <img id="foto" src="" alt="Imagen de la tarta generada según la configuración">
                </div>
                <div class="galeria-foot">
                    <span class="contador" id="contador" aria-live="polite" hidden>1 / 10</span>
                    <button class="btn-reiniciar" id="btnReiniciar" type="button" hidden>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true" focusable="false">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                        </svg>
                        Reiniciar galería
                    </button>
                </div>
            </div>

            <!-- Mensaje de error -->
            <div class="error-msg" id="errorMsg" role="alert">
                No se pudo cargar la imagen. El servicio puede estar saturado, prueba de nuevo en unos segundos.
            </div>
        </main>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- Modal de ajustes -->
    <div class="modal-overlay" id="modalOverlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
            <div class="modal-head">
                <h3 id="modalTitle">Ajustes</h3>
                <button class="modal-close" id="btnCerrarModal" type="button" aria-label="Cerrar modal">
                    <span aria-hidden="true">✕</span>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-cancelar" id="btnCancelar" type="button">Cancelar</button>
                <button class="btn btn-guardar" id="btnGuardar" type="button">Guardar cambios</button>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
